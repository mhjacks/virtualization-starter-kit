---
vms:
  server:
    count: 2
    role: server
    os: rhel9
    additionalDisks:
      - name: data
        storage: 80Gi
      - name: extra
        storage: 40Gi

vmNamespace: gitops-vms

registryCredentialExternalSecrets:
  quay-creds:
    vaultKey: secret/data/hub/quay-image-robot

externalDataSources:
  - name: quay-windows
    type: registry
    url: "docker://quay.io/martjack/window_image:latest"
    size: 50G
    registryCredentialsSecret: quay-creds #
serviceAccountName: gitops-vms-sa

rbac:
  roleBindings:
    - name: view-machine-api
      createBinding: true
      scope:
        cluster: false
        namespace: "openshift-machine-api"
      subjects:
        kind: ServiceAccount
        name: gitops-vms-sa
        namespace: gitops-vms
        apiGroup: ""
      roleRef:
        kind: ClusterRole
        name: view-machine-api

waitForMetalNode: false
